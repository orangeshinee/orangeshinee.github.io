# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/
# Header
menu:
  Home: 
  Archives: /archives
  
# Content
excerpt_link: More
prev: Prev
next: Next
reply: Reply
share: Share
fancybox: true

#avatar 
avatar: https://shinepics-1254247808.cos.ap-guangzhou.myqcloud.com/16-10-6/64457700.jpg

# Site
title: 闲谈梦落花
subtitle: 长路漫漫离家，伴君不负韶华。
description: 长路漫漫离家，伴君不负韶华。
author: shineee
language: zh-CN
timezone: 


# Miscellaneous
google_analytics:
#duoshuo_shortname: shineee
#duoshuo_share: true
rss: 
google_site_verification: 
baidu_analytics: 38cf35b14428fed12ee207849cffa5a6 
favicon: /favicon.ico
music: 
# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: http://blog.shineee.win/
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:

#网易跟帖
wangYi: eac70afbf5d442379579eb655a08a171


# Directory

source_dir: source # 资源文件夹 存放内容
public_dir: public # 公共文件夹 存放站点文件
tag_dir: tags  # 标签文件夹
archive_dir: archives  #归档文件夹
category_dir: categories #分类
code_dir: downloads/code
i18n_dir: :lang
skip_render:


# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link: true # Open external links in new tab
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace:

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page


# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: next-reloaded

# Deployment
## Docs: https://hexo.io/docs/deployment.html
deploy:
  type: git
  repository: https://github.com/orangeshinee/orangeshinee.github.io.git
  branch: master
  
